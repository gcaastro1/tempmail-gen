<div class="relative w-full">
  <p class="text-xs font-semibold text-green-400 uppercase tracking-wider mb-2 drop-shadow-sm ml-1">Your temporary email address</p>
  <div
    class="relative h-14 flex items-center text-md w-full max-w-full text-white bg-slate-800 border border-slate-700 rounded-xl pr-12 pl-4 focus-within:ring-2 focus-within:ring-green-500 focus-within:bg-slate-700 transition-all duration-300 shadow-inner group"
  >
    <div class="truncate flex-1 font-mono text-green-100 tracking-wide select-all">{{ address }}</div>
    <span class="absolute right-2 flex items-center">
      <button
        type="button"
        class="p-2 bg-green-500/20 hover:bg-green-500/50 text-green-400 hover:text-white rounded-lg transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-green-400 group-hover:scale-105 active:scale-95"
        (click)="copyEmail()"
        title="Copy to clipboard"
      >
        <fa-icon [icon]="clipboardIcon" class="w-5 h-5"></fa-icon>
      </button>
    </span>
  </div>
  <span
    *ngIf="showContent"
    class="absolute z-10 top-20 right-0 px-4 py-2 text-sm font-semibold text-white transition-opacity duration-300 rounded-lg shadow-xl tooltip bg-green-500 animate-bounce"
    >Copied!
  </span>
</div>
