<div class="h-full w-full flex flex-col custom-scrollbar overflow-y-auto">
  <div class="p-6 md:p-8 flex gap-5 items-start flex-col md:flex-row border-b border-slate-700 bg-slate-900/30">
    <div
      class="w-12 h-12 rounded-full flex items-center justify-center bg-gradient-to-tr from-green-500 to-emerald-600 shadow-lg shrink-0"
    >
      <span class="text-white text-xl font-bold">{{
        mail.fromAddr.substr(0, 1).toUpperCase()
      }}</span>
    </div>
    <div class="flex flex-col w-full">
      <h3
        class="font-bold text-xl md:text-2xl text-slate-100 mb-1 leading-tight break-words"
      >
        {{ mail.headerSubject || 'No Subject' }}
      </h3>
      <div class="flex items-center gap-2">
        <span class="px-2 py-0.5 rounded-md bg-slate-700 text-xs font-mono text-green-400">{{ mail.fromAddr }}</span>
      </div>
    </div>
  </div>
  <div class="p-6 md:p-8 text-slate-300 leading-relaxed font-sans whitespace-pre-wrap flex-1">
    {{ mail.text }}
  </div>
</div>
