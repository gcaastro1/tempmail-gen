<div
  *ngIf="notify"
  class="flex flex-col gap-3 bg-slate-800 border border-slate-700 w-full max-w-[320px] h-fit fixed top-4 right-4 z-50 rounded-2xl p-5 shadow-[0_10px_40px_rgba(0,0,0,0.5)] animate-fade-in-up"
>
  <div class="flex items-center gap-3">
    <div class="bg-green-500/20 p-2 rounded-full text-green-400">
      <fa-icon [icon]="bell"></fa-icon>
    </div>
    <h1 class="font-bold text-lg text-slate-100">Enable Notifications</h1>
  </div>
  <p class="text-sm text-slate-300 leading-relaxed">
    Don't miss an email! We will keep you informed when new emails arrive in your temporary inbox.
  </p>
  <div class="flex gap-3 justify-end mt-2">
    <button
      class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-slate-300 py-1.5 px-4 text-sm font-semibold rounded-lg transition-colors"
      (click)="closeNotify()"
    >
      No Thanks
    </button>
    <button
      class="bg-green-500 hover:bg-green-400 text-slate-900 py-1.5 px-4 text-sm font-semibold rounded-lg shadow-[0_0_10px_rgba(74,222,128,0.4)] transition-colors"
      (click)="confirmNotifcation()"
    >
      Allow
    </button>
  </div>
</div>

<button
  type="button"
  (click)="showNotify()"
  class="bg-green-500 hover:bg-green-400 text-slate-900 p-3 rounded-full cursor-pointer fixed bottom-6 right-6 shadow-[0_0_15px_rgba(74,222,128,0.5)] hover:shadow-[0_0_25px_rgba(74,222,128,0.8)] transition-all duration-300 hover:scale-110 z-40"
>
  <fa-icon [icon]="bell" class="text-xl"></fa-icon>
</button>
