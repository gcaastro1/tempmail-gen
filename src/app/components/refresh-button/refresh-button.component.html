<div class="flex gap-4 items-center justify-between w-full">
  <div class="text-green-400 flex flex-col justify-center bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl flex-1 shadow-inner">
    <p class="text-xs uppercase tracking-wider font-semibold opacity-80 mb-1">Auto refresh in</p>
    <p class="font-mono text-xl font-bold text-white">{{ countDown | async | formatTime }}</p>
  </div>

  <button
    type="button"
    class="rounded-xl px-6 py-4 h-full flex items-center justify-center gap-2 bg-green-500 hover:bg-green-400 text-slate-900 font-bold transition-all duration-300 shadow-[0_0_15px_rgba(74,222,128,0.5)] hover:shadow-[0_0_25px_rgba(74,222,128,0.7)] group transform active:scale-95"
    (click)="this.refresh.emit()"
  >
    <fa-icon
      [icon]="refreshIcon"
      class="flex items-center justify-center text-lg group-hover:rotate-180 transition-transform duration-500"
    ></fa-icon>
    <span>Refresh</span>
  </button>
</div>
